name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SOROBAN_RPC_URL:      ${{ vars.NEXT_PUBLIC_SOROBAN_RPC_URL }}
          NEXT_PUBLIC_NETWORK_PASSPHRASE:   ${{ vars.NEXT_PUBLIC_NETWORK_PASSPHRASE }}
          NEXT_PUBLIC_FACTORY_CONTRACT_ID:  ${{ vars.NEXT_PUBLIC_FACTORY_CONTRACT_ID }}
          NEXT_PUBLIC_GOVERNOR_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_GOVERNOR_CONTRACT_ID }}
